name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uninest
          POSTGRES_PASSWORD: uninest
          POSTGRES_DB: uninest_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U uninest" --health-interval 5s
          --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://uninest:uninest@localhost:5432/uninest_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check app
      - name: Pytest
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend — lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx tsc -b
      - run: npm run build

  images:
    name: Build & scan images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t uninest-api:${{ github.sha }} ./server
      - name: Build web image
        run: docker build -t uninest-web:${{ github.sha }} ./client
      - name: Trivy scan (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: uninest-api:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "0"

  deploy-staging:
    name: Deploy to staging
    needs: [images]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - run: echo "Push images to registry, run 'alembic upgrade head', roll out API + web."

  e2e:
    name: Playwright E2E
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "Run Playwright suite against staging URL."

  deploy-production:
    name: Deploy to production
    needs: [e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - run: echo "Manual approval gate -> migrate -> blue/green rollout."
