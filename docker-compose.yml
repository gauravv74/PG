name: uninest

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uninest
      POSTGRES_PASSWORD: uninest
      POSTGRES_DB: uninest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uninest"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql+psycopg://uninest:uninest@db:5432/uninest
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head || true;
             python -m app.db.seed || true;
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./server:/app

  worker:
    build: ./server
    env_file: ./server/.env
    environment:
      DATABASE_URL: postgresql+psycopg://uninest:uninest@db:5432/uninest
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - api
      - redis
    command: celery -A app.workers.celery_app worker -B --loglevel=info
    volumes:
      - ./server:/app

  web:
    build: ./client
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
